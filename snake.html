<!DOCTYPE html>
<html>
<head>
    <title>İlan Oyunu 🐍</title>
    <style>
        body { font-family: Arial; margin:0; text-align:center; background:#ddd;}
        #panel {
            background: #333;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        #panel button {
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
        }
        #score { color: #fff; }
        canvas { 
            display: block; 
            margin: 20px auto; 
            background-color: #eee;
            background-image: linear-gradient(to right, #ccc 1px, transparent 1px),
                              linear-gradient(to bottom, #ccc 1px, transparent 1px);
            background-size: 20px 20px; /* damalı fon */
        }
        #gameOverBtn {
            display:none;
            padding: 10px 20px;
            font-size:16px;
            margin-top:10px;
        }
    </style>
</head>
<body>

<div id="panel">
    <button id="menuBtn">Ana Menyu 🏠</button>
    <button id="pauseBtn">Dayandır ⏸</button>
    <button id="restartBtn">Yenidən Başlat 🔄</button>
    <div id="score">Score: 0</div>
</div>

<canvas id="game" width="400" height="400"></canvas>
<button id="gameOverBtn">Yenidən Oyna 🔁</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
let snake = [{x: 200, y: 200}];
let food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
let dx = box;
let dy = 0;
let gameOver = false;
let paused = false;
let score = 0;

function drawSquare(x,y,color){
    ctx.fillStyle = color;
    ctx.fillRect(x,y,box,box);
    ctx.strokeStyle="white";
    ctx.strokeRect(x,y,box,box);
}

function draw(){
    ctx.clearRect(0,0,400,400);
    for(let i=0;i<snake.length;i++){
        ctx.fillStyle = i===0 ? "green":"darkgreen";
        drawSquare(snake[i].x,snake[i].y,ctx.fillStyle);
    }
    drawSquare(food.x,food.y,"red");
}

function newFood(){
    food.x = Math.floor(Math.random()*20)*box;
    food.y = Math.floor(Math.random()*20)*box;
}

function moveSnake(){
    if(gameOver || paused) return;
    let head = {x: snake[0].x + dx, y: snake[0].y + dy};

    // divara dəydi
    if(head.x<0 || head.x>=400 || head.y<0 || head.y>=400){
        endGame();
        return;
    }

    // özünə dəydi
    for(let i=0;i<snake.length;i++){
        if(head.x===snake[i].x && head.y===snake[i].y){
            endGame();
            return;
        }
    }

    snake.unshift(head);

    // yem yedi
    if(head.x === food.x && head.y === food.y){
        score += 1;
        document.getElementById("score").innerText = "Score: "+score;
        newFood();
    } else {
        snake.pop();
    }
}

// ---- klaviatura ----
document.addEventListener("keydown", function(e){
    if(gameOver || paused) return;
    if(e.key==="ArrowLeft" && dx===0){ dx=-box; dy=0; }
    if(e.key==="ArrowRight" && dx===0){ dx=box; dy=0; }
    if(e.key==="ArrowUp" && dy===0){ dx=0; dy=-box; }
    if(e.key==="ArrowDown" && dy===0){ dx=0; dy=box; }
});

// ---- panel düymələri ----
document.getElementById("restartBtn").addEventListener("click", function(){
    snake = [{x:200,y:200}];
    dx = box; dy=0;
    newFood();
    score = 0;
    document.getElementById("score").innerText="Score: 0";
    gameOver=false;
    paused=false;
    document.getElementById("gameOverBtn").style.display="none";
});

document.getElementById("pauseBtn").addEventListener("click", function(){
    paused = !paused;
    document.getElementById("pauseBtn").innerText = paused ? "Davam et ▶" : "Dayandır ⏸";
});

document.getElementById("menuBtn").addEventListener("click", function(){
    window.location.href="index.html";
});

// ---- oyun bitdi düyməsi ----
function endGame(){
    gameOver=true;
    document.getElementById("gameOverBtn").style.display="inline-block";
}

document.getElementById("gameOverBtn").addEventListener("click", function(){
    snake = [{x:200,y:200}];
    dx = box; dy=0;
    newFood();
    score = 0;
    document.getElementById("score").innerText="Score: 0";
    gameOver=false;
    paused=false;
    document.getElementById("gameOverBtn").style.display="none";
});

// ---- oyun loop ----
setInterval(function(){
    if(!gameOver && !paused){
        moveSnake();
        draw();
    }
},150);
</script>
</body>
</html>
